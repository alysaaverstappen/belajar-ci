name: CI Pipeline

on:
  push:
    branches: [ master, main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login ke GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image
        run: docker build -t ghcr.io/alysaaverstappen/belajar-ci:latest .

      - name: Push Docker Image
        run: docker push ghcr.io/alysaaverstappen/belajar-ci:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        run: echo "Deploy selesai!"
